# Sources candidates — Vectora Inbox V3
# ROLE : backlog des sources identifiees mais pas encore validees
#
# Une source candidate n'est jamais ingeree par le moteur.
# Workflow pour activer une source :
#   1. python scripts/validate_source.py --source <source_key>
#   2. Si OK -> ajouter dans canonical/ingestion/source_configs_v3.yaml (validated: true)
#   3. Ajouter dans canonical/ingestion/source_catalog_v3.yaml
#   4. Verifier company_scopes.yaml (pure_player ou hybrid ?)
#
# Statuts possibles :
#   to_validate  : pas encore teste
#   in_progress  : test en cours
#   validated    : passe dans source_catalog_v3.yaml + source_configs_v3.yaml
#   rejected     : URL morte, pas de news, hors scope

