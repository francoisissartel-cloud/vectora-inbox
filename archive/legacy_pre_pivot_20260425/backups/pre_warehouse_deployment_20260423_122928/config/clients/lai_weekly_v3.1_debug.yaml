# =============================================================================
# LAI INTELLIGENCE WEEKLY — CLIENT CONFIG v3.1 DEBUG (Test Période Étendue)
# =============================================================================
# Version de test basée sur v3.1 avec période étendue pour tester la détection
# de l'article Pfizer du 9 mars 2026 (hash: sha256:41a2561b3026a6287d28406eb89460ed5a184666b060602b0f3745891a2ff33c)
# =============================================================================

# -----------------------------------------------------------------------------
# IDENTITÉ CLIENT
# -----------------------------------------------------------------------------
client_profile:
  client_id: "lai_weekly_v3.1_debug"
  name: "LAI Intelligence Weekly DEBUG - Test Période Étendue"
  active: true
  language: "en"
  frequency: "weekly"
  editorial_style:
    tone: "executive"
    voice: "concise"
    target_audience: "executives"

# -----------------------------------------------------------------------------
# INGESTION - PÉRIODE ÉTENDUE POUR TEST
# -----------------------------------------------------------------------------
ingestion:
  # PÉRIODE ÉTENDUE : 60 jours au lieu de 7 pour inclure l'article du 9 mars
  default_period_days: 60
  
  ingestion_mode: "balanced"
  
  source_bouquets:
    - "lai_full_mvp"
  
  sources_extra: []
  
  content_filters:
    min_word_count: 100
    min_content_length: 300

# -----------------------------------------------------------------------------
# WATCH DOMAINS
# -----------------------------------------------------------------------------
watch_domains:
  - id: "tech_lai_ecosystem"
    type: "technology"
    priority: "high"
    enabled: true
    technology_scope: "lai_keywords"
    company_scope: "lai_companies_global"
    trademark_scope: "lai_trademarks_global"

# -----------------------------------------------------------------------------
# BEDROCK CONFIG
# -----------------------------------------------------------------------------
bedrock_config:
  normalization_prompt: "generic_normalization"
  domain_scoring_prompt: "lai_domain_scoring"
  editorial_prompt: "lai_editorial"
  enable_domain_scoring: true

# -----------------------------------------------------------------------------
# NEWSLETTER — SÉLECTION
# -----------------------------------------------------------------------------
newsletter_selection:
  max_items_total: 20
  min_domain_score: 40

# -----------------------------------------------------------------------------
# NEWSLETTER — LAYOUT
# -----------------------------------------------------------------------------
newsletter_layout:
  distribution_strategy: "specialized_with_fallback"
  sections:
    - id: "regulatory_updates"
      title: "Regulatory Updates"
      source_domains: ["tech_lai_ecosystem"]
      max_items: 5
      filter_event_types: ["regulatory"]
      sort_by: "score_desc"
      priority: 1

    - id: "clinical_updates"
      title: "Clinical Updates"
      source_domains: ["tech_lai_ecosystem"]
      max_items: 5
      filter_event_types: ["clinical_update"]
      sort_by: "score_desc"
      priority: 2

    - id: "partnerships_deals"
      title: "Partnerships & Deals"
      source_domains: ["tech_lai_ecosystem"]
      max_items: 4
      filter_event_types: ["partnership"]
      sort_by: "score_desc"
      priority: 3

    - id: "business_commercial"
      title: "Business & Commercial"
      source_domains: ["tech_lai_ecosystem"]
      max_items: 3
      filter_event_types: ["business", "manufacturing_supply"]
      sort_by: "score_desc"
      priority: 4

    - id: "other_signals"
      title: "Other Signals"
      source_domains: ["tech_lai_ecosystem"]
      max_items: 5
      filter_event_types: ["*"]
      sort_by: "score_desc"
      priority: 999

# -----------------------------------------------------------------------------
# NEWSLETTER — DELIVERY
# -----------------------------------------------------------------------------
newsletter_delivery:
  format: "markdown"
  include_tldr: true
  include_intro: true
  include_metrics: true
  delivery_method: "s3"

# -----------------------------------------------------------------------------
# METADATA
# -----------------------------------------------------------------------------
metadata:
  config_version: "3.1_debug"
  canonical_version: "3.0"
  min_runtime_version: "3.0.0"
  created_date: "2026-04-20"
  created_by: "DEBUG - Test détection article Pfizer"
  vertical: "LAI"
  notes: |
    Configuration DEBUG basée sur v3.1 avec période étendue à 60 jours.
    Objectif : tester si l'article Pfizer du 9 mars 2026 sera détecté et ingéré
    avec les mots-clés LAI "once-monthly" et "subcutaneous".
    
    Article cible :
    - Titre: "Pfizer's Phase 2 Study of Trispecific Antibody Positive in Moderate to Severe Atopic Dermatitis"
    - Date: 2026-03-09
    - Hash: sha256:41a2561b3026a6287d28406eb89460ed5a184666b060602b0f3745891a2ff33c
    - Mots-clés LAI détectés manuellement: "once-monthly" (2x), "subcutaneous" (1x)